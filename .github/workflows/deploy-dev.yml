name: Deploy to Development

on:
push:
branches: [develop]

env:
NODE_VERSION: '18'
AWS_REGION: us - east - 1
ENVIRONMENT: dev
STACK_NAME: eis - dev

jobs:
deploy:
name: Deploy to Dev
runs - on: ubuntu - latest
environment: development

steps:
- name: Checkout code
uses: actions / checkout@v4

- name: Setup Node.js
uses: actions / setup - node@v4
with:
node - version: ${ { env.NODE_VERSION } }
cache: 'npm'

    - name: Install dependencies
run: npm ci

    - name: Build application
run: npm run build

    - name: Configure AWS credentials
uses: aws - actions / configure - aws - credentials@v4
with:
aws - access - key - id: ${ { secrets.AWS_ACCESS_KEY_ID } }
aws - secret - access - key: ${ { secrets.AWS_SECRET_ACCESS_KEY } }
aws - region: ${ { env.AWS_REGION } }

- name: Package Lambda functions
run: npm run package

    - name: Deploy CloudFormation stack
run: |
    aws cloudformation deploy \
--template - file infrastructure / main.yaml \
--stack - name ${ { env.STACK_NAME } } \
--parameter - overrides Environment = ${ { env.ENVIRONMENT } } \
--capabilities CAPABILITY_NAMED_IAM \
--no - fail - on - empty - changeset

    - name: Deploy Lambda code
run: |
          for func in dashboard kpis alerts alert - processor reports; do
            aws lambda update - function- code \
--function- name UniversityOfBaltimore - EIS - ${ func ^} -${ { env.ENVIRONMENT } } \
--zip - file fileb://dist/lambdas/${func}.zip \
              || echo "Function ${func} not found, skipping..."
done

    - name: Deploy frontend to S3
run: |
    aws s3 sync frontend / dist / s3://${{ secrets.FRONTEND_BUCKET_DEV }}/ --delete

- name: Invalidate CloudFront cache
run: |
    aws cloudfront create - invalidation \
--distribution - id ${ { secrets.CLOUDFRONT_DIST_DEV } } \
--paths "/*"

    - name: Run smoke tests
run: npm run test: smoke
env:
API_URL: ${ { secrets.API_URL_DEV } }

- name: Notify on success
if: success()
run: echo "✅ Deployment to DEV successful!"

    - name: Notify on failure
if: failure()
run: echo "❌ Deployment to DEV failed!"
