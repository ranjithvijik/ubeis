name: Deploy to Production

on:
push:
branches: [main]
workflow_dispatch:
inputs:
confirm:
description: 'Type "deploy" to confirm production deployment'
required: true

env:
NODE_VERSION: '18'
AWS_REGION: us - east - 1
ENVIRONMENT: prod
STACK_NAME: eis - prod

jobs:
  # ============================================
  # VALIDATION JOB
  # ============================================
    validate:
name: Validate Deployment
runs - on: ubuntu - latest
if: github.event_name == 'workflow_dispatch'

steps:
- name: Validate confirmation
if: github.event.inputs.confirm != 'deploy'
run: |
    echo "❌ Deployment not confirmed. Please type 'deploy' to proceed."
          exit 1
 
  # ============================================
  # BUILD & TEST JOB
  # ============================================
    build - and - test:
name: Build and Test
runs - on: ubuntu - latest
needs: [validate]
if: always() && (needs.validate.result == 'success' || needs.validate.result == 'skipped')

steps:
- name: Checkout code
uses: actions / checkout@v4

- name: Setup Node.js
uses: actions / setup - node@v4
with:
node - version: ${ { env.NODE_VERSION } }
cache: 'npm'

    - name: Install dependencies
run: npm ci

    - name: Run tests
run: npm test-- --coverage

    - name: Build application
run: npm run build

    - name: Upload artifacts
uses: actions / upload - artifact@v4
with:
name: production - build
path: |
    dist /
    frontend / dist /
 
  # ============================================
  # DEPLOY JOB
  # ============================================
    deploy:
name: Deploy to Production
runs - on: ubuntu - latest
needs: build - and - test
environment: production

steps:
- name: Checkout code
uses: actions / checkout@v4

- name: Download artifacts
uses: actions / download - artifact@v4
with:
name: production - build

    - name: Configure AWS credentials
uses: aws - actions / configure - aws - credentials@v4
with:
aws - access - key - id: ${ { secrets.AWS_ACCESS_KEY_ID_PROD } }
aws - secret - access - key: ${ { secrets.AWS_SECRET_ACCESS_KEY_PROD } }
aws - region: ${ { env.AWS_REGION } }

- name: Deploy CloudFormation stack
run: |
    aws cloudformation deploy \
--template - file infrastructure / main.yaml \
--stack - name ${ { env.STACK_NAME } } \
--parameter - overrides Environment = ${ { env.ENVIRONMENT } } \
--capabilities CAPABILITY_NAMED_IAM \
--no - fail - on - empty - changeset

    - name: Deploy Lambda functions
run: |
          for func in dashboard kpis alerts alert - processor reports; do
            aws lambda update - function- code \
--function- name UniversityOfBaltimore - EIS - ${ func ^} -${ { env.ENVIRONMENT } } \
--zip - file fileb://dist/lambdas/${func}.zip
done

    - name: Deploy frontend
run: |
    aws s3 sync frontend / dist / s3://${{ secrets.FRONTEND_BUCKET_PROD }}/ --delete

- name: Invalidate CloudFront
run: |
    aws cloudfront create - invalidation \
--distribution - id ${ { secrets.CLOUDFRONT_DIST_PROD } } \
--paths "/*"
 
  # ============================================
  # VERIFY JOB
  # ============================================
    verify:
name: Verify Deployment
runs - on: ubuntu - latest
needs: deploy

steps:
- name: Checkout code
uses: actions / checkout@v4

- name: Setup Node.js
uses: actions / setup - node@v4
with:
node - version: ${ { env.NODE_VERSION } }
cache: 'npm'

    - name: Install dependencies
run: npm ci

    - name: Run smoke tests
run: npm run test: smoke
env:
API_URL: ${ { secrets.API_URL_PROD } }

- name: Health check
run: |
    response=$(curl - s - o / dev / null - w "%{http_code}" ${{ secrets.API_URL_PROD }}/health)
if ["$response" != "200"]; then
            echo "❌ Health check failed with status $response"
            exit 1
fi
          echo "✅ Health check passed"

    - name: Notify success
if: success()
run: echo "🚀 Production deployment successful!"
 
  # ============================================
  # ROLLBACK JOB(Manual trigger)
  # ============================================
    rollback:
name: Rollback(if needed)
    runs - on: ubuntu - latest
needs: verify
if: failure()

steps:
- name: Configure AWS credentials
uses: aws - actions / configure - aws - credentials@v4
with:
aws - access - key - id: ${ { secrets.AWS_ACCESS_KEY_ID_PROD } }
aws - secret - access - key: ${ { secrets.AWS_SECRET_ACCESS_KEY_PROD } }
aws - region: ${ { env.AWS_REGION } }

- name: Rollback CloudFormation
run: |
    echo "⚠️ Initiating rollback..."
          aws cloudformation rollback - stack--stack - name ${ { env.STACK_NAME } } || true
          echo "Rollback initiated. Please verify manually."

10. DEPLOYMENT SCRIPTS
